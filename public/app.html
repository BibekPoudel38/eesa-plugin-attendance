<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <script src="/vendor/leaflet/leaflet.js"></script>
  <style>
    /* ---- Theme tokens. Light is the base; dark applies when the host asks
           (data-theme="dark") or, before the host message arrives, when the OS
           prefers dark. The host (Flutter/React) sends the phone's theme over
           the postMessage bridge, so the plugin always matches the app. ---- */
    :root {
      color-scheme: light dark;
      --bg:#eef3f4;
      --grad: radial-gradient(1100px 460px at 50% -160px, rgba(15,139,150,.14), transparent 72%);
      --card:#ffffff; --card-2:#eef3f5; --line:#e0e9eb;
      --ink:#0d1d23; --muted:#5f7480; --faint:#8fa2ab;
      --primary:#0f8b96; --primary-ink:#fff; --primary-weak:rgba(15,139,150,.12);
      --success:#159a63; --success-weak:rgba(21,154,99,.14);
      --warn:#b9820f; --warn-weak:rgba(185,130,15,.16);
      --danger:#d24b38; --danger-weak:rgba(210,75,56,.14);
      --shadow:0 1px 2px rgba(16,40,48,.05), 0 10px 30px rgba(16,40,48,.07);
      --radius:16px; --radius-sm:11px;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:#0c161b;
        --grad: radial-gradient(1100px 460px at 50% -160px, rgba(45,180,190,.16), transparent 72%);
        --card:#14232b; --card-2:#0f1d24; --line:#233a44;
        --ink:#e9f3f4; --muted:#8fa8b1; --faint:#5f7783;
        --primary:#2db4be; --primary-ink:#04222a; --primary-weak:rgba(45,180,190,.16);
        --success:#4fd08a; --success-weak:rgba(79,208,138,.16);
        --warn:#e6c15e; --warn-weak:rgba(230,193,94,.16);
        --danger:#e0705e; --danger-weak:rgba(224,112,94,.16);
        --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px rgba(0,0,0,.34);
      }
    }
    :root[data-theme="dark"] {
      --bg:#0c161b;
      --grad: radial-gradient(1100px 460px at 50% -160px, rgba(45,180,190,.16), transparent 72%);
      --card:#14232b; --card-2:#0f1d24; --line:#233a44;
      --ink:#e9f3f4; --muted:#8fa8b1; --faint:#5f7783;
      --primary:#2db4be; --primary-ink:#04222a; --primary-weak:rgba(45,180,190,.16);
      --success:#4fd08a; --success-weak:rgba(79,208,138,.16);
      --warn:#e6c15e; --warn-weak:rgba(230,193,94,.16);
      --danger:#e0705e; --danger-weak:rgba(224,112,94,.16);
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px rgba(0,0,0,.34);
    }

    * { box-sizing: border-box; }
    html, body { height:100%; }
    body {
      margin:0; color:var(--ink);
      background:var(--grad), var(--bg); background-attachment:fixed;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    }
    .ic { width:1em; height:1em; flex:none; vertical-align:-.12em; }

    /* Header */
    header {
      position:sticky; top:0; z-index:5;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 18px; background:color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line);
    }
    .brand { display:flex; align-items:center; gap:10px; font-weight:750; letter-spacing:-.01em; }
    .brand .logo {
      width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
      background:var(--primary); color:var(--primary-ink); font-size:1rem;
    }
    .brand h1 { font-size:1.02rem; margin:0; font-weight:750; }
    .whochip { display:flex; align-items:center; gap:9px; }
    .whochip .avatar {
      width:32px; height:32px; border-radius:50%; display:grid; place-items:center;
      background:var(--primary-weak); color:var(--primary); font-weight:700; font-size:.82rem;
    }
    .whochip .meta { text-align:right; line-height:1.15; }
    .whochip .nm { font-size:.82rem; font-weight:650; }
    .whochip .rl { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

    /* Nav */
    nav { display:flex; gap:7px; padding:12px 14px 4px; overflow-x:auto; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    nav button {
      display:inline-flex; align-items:center; gap:7px; white-space:nowrap; cursor:pointer;
      background:var(--card); border:1px solid var(--line); color:var(--muted);
      padding:8px 14px; border-radius:999px; font-size:.83rem; font-weight:600;
      transition:all .15s ease; box-shadow:var(--shadow);
    }
    nav button:hover { color:var(--ink); }
    nav button.active { background:var(--primary); color:var(--primary-ink); border-color:transparent; }
    nav button .ic { width:15px; height:15px; }

    main { padding:14px 16px 40px; max-width:860px; margin:0 auto; }
    .fade { animation:fade .28s ease; }
    @keyframes fade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* Cards */
    .card {
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      padding:16px; margin-bottom:14px; box-shadow:var(--shadow);
    }
    .card > h2 {
      margin:0 0 12px; font-size:.72rem; color:var(--muted);
      text-transform:uppercase; letter-spacing:.08em; font-weight:700;
      display:flex; align-items:center; gap:7px;
    }
    .card > h2 .ic { color:var(--primary); width:15px; height:15px; }
    .lead { margin:0 0 12px; color:var(--muted); font-size:.86rem; line-height:1.45; }

    /* Hero (staff status) */
    .hero {
      position:relative; overflow:hidden; border-radius:var(--radius);
      padding:22px; margin-bottom:14px; border:1px solid var(--line);
      background:var(--card); box-shadow:var(--shadow);
    }
    .hero--on { background:linear-gradient(135deg,#12a06a,#0f8b96 92%); color:#fff; border-color:transparent; }
    .hero__top { display:flex; align-items:center; gap:12px; }
    .hero__badge {
      width:46px; height:46px; border-radius:13px; display:grid; place-items:center;
      background:var(--primary-weak); color:var(--primary); font-size:1.3rem;
    }
    .hero--on .hero__badge { background:rgba(255,255,255,.2); color:#fff; }
    .hero__state { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; line-height:1.1; }
    .hero__sub { font-size:.9rem; opacity:.82; margin-top:2px; }
    .stats { display:flex; gap:10px; margin-top:18px; }
    .stat { flex:1; border-radius:var(--radius-sm); padding:12px 14px; background:var(--card-2); }
    .hero--on .stat { background:rgba(255,255,255,.14); }
    .stat__num { font-size:1.35rem; font-weight:800; letter-spacing:-.02em; }
    .stat__lbl { font-size:.68rem; opacity:.82; text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }
    .pulse { width:9px; height:9px; border-radius:50%; background:#fff; box-shadow:0 0 0 0 rgba(255,255,255,.7); animation:pulse 1.8s infinite; display:inline-block; margin-left:8px; vertical-align:middle; }
    @keyframes pulse { 70% { box-shadow:0 0 0 9px rgba(255,255,255,0); } 100% { box-shadow:0 0 0 0 rgba(255,255,255,0); } }

    /* Tables */
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    thead th {
      text-align:left; padding:8px 10px; color:var(--faint); font-weight:700;
      font-size:.68rem; text-transform:uppercase; letter-spacing:.05em;
      border-bottom:1px solid var(--line);
    }
    tbody td { padding:10px; border-bottom:1px solid var(--line); vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr { transition:background .12s; }
    tbody tr:hover { background:var(--card-2); }
    .num { font-variant-numeric:tabular-nums; }

    /* List rows (history / zones as chips) */
    .rowitem { display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line); }
    .rowitem:last-child { border-bottom:none; }
    .rowitem .lead-ic { width:34px; height:34px; border-radius:10px; background:var(--primary-weak); color:var(--primary); display:grid; place-items:center; flex:none; }
    .rowitem .grow { flex:1; min-width:0; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border-radius:999px; background:var(--card-2); border:1px solid var(--line); font-size:.82rem; }
    .chip .ic { color:var(--primary); width:15px; height:15px; }

    .muted { color:var(--muted); }
    .err { color:var(--danger); }
    .ok { color:var(--success); }
    .empty { text-align:center; color:var(--muted); padding:26px 10px; font-size:.88rem; }
    .empty .ic { width:26px; height:26px; opacity:.5; display:block; margin:0 auto 8px; }

    /* Inputs / buttons */
    input, select {
      font:inherit; font-size:.86rem; padding:9px 11px; border-radius:10px;
      border:1px solid var(--line); background:var(--card-2); color:var(--ink); width:100%;
    }
    input:focus, select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-weak); }
    .btn {
      font:inherit; font-size:.85rem; font-weight:650; padding:9px 14px; border-radius:10px;
      border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer;
      display:inline-flex; align-items:center; gap:7px; transition:all .14s;
    }
    .btn:hover { border-color:var(--primary); }
    .btn.primary { background:var(--primary); color:var(--primary-ink); border-color:transparent; }
    .btn.primary:hover { filter:brightness(1.06); }
    .btn.small { padding:6px 10px; font-size:.78rem; }
    .btn.link { background:transparent; border:none; color:var(--primary); padding:4px 6px; font-weight:650; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .field { display:flex; flex-direction:column; gap:5px; font-size:.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
    .field input, .field select { width:auto; text-transform:none; font-weight:400; letter-spacing:0; }

    .pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px; font-size:.72rem; font-weight:700; text-transform:capitalize; }
    .pill.pending, .pill.open, .pill.incomplete { background:var(--warn-weak); color:var(--warn); }
    .pill.approved, .pill.complete { background:var(--success-weak); color:var(--success); }
    .pill.rejected { background:var(--danger-weak); color:var(--danger); }

    .toast {
      position:fixed; left:50%; bottom:22px; transform:translate(-50%,10px); z-index:50;
      background:var(--card); border:1px solid var(--line); padding:11px 16px; border-radius:12px;
      font-size:.86rem; font-weight:600; box-shadow:var(--shadow); opacity:0; pointer-events:none;
      transition:opacity .2s, transform .2s;
    }
    .toast.show { opacity:1; transform:translate(-50%,0); }
    .toast.err { border-color:var(--danger); color:var(--danger); }

    /* Zone map */
    #zmap { height:340px; border-radius:var(--radius-sm); border:1px solid var(--line); margin-bottom:10px; z-index:0; }
    #zmap .leaflet-container { background:var(--card-2); font:inherit; }
    :root[data-theme="dark"] #zmap .leaflet-tile,
    :root:not([data-theme="light"]) #zmap .leaflet-tile { filter:invert(1) hue-rotate(180deg) brightness(.92) contrast(.9); }
    @media (prefers-color-scheme: light) { :root:not([data-theme="dark"]) #zmap .leaflet-tile { filter:none; } }
    .zpin { width:16px; height:16px; box-sizing:border-box; border-radius:50%; background:var(--primary); border:2px solid #fff; box-shadow:0 0 0 1px var(--primary); cursor:grab; }
    .zhandle { width:14px; height:14px; box-sizing:border-box; border-radius:50%; background:#fff; border:2px solid var(--primary); cursor:ew-resize; }
    .map-hint { font-size:.74rem; color:var(--muted); margin:-2px 0 10px; }
    /* Per-user job-type picks */
    .wtwrap { display:flex; flex-wrap:wrap; gap:8px 16px; }
    .wtchk { display:inline-flex; align-items:center; gap:6px; font-size:.82rem; white-space:nowrap; }
    .wtchk input { width:auto; }
    tr.wtrow td { padding-top:2px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">✦</span>
      <h1>Attendance</h1>
    </div>
    <div class="whochip" id="who"><span class="muted" style="font-size:.82rem">connecting…</span></div>
  </header>
  <nav id="nav"></nav>
  <main id="view"><div class="empty">Loading…</div></main>
  <div class="toast" id="toast"></div>

  <script>
    let TOKEN = null, CTX = null, TAB = null;
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const hrs = (m) => (Number(m || 0) / 60).toFixed(1);
    const timeOf = (iso) => iso ? new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
    const dateNice = (s) => { if (!s) return '—'; const d = new Date(s + 'T00:00:00'); return isNaN(d) ? s : d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }); };
    const today = () => new Date().toISOString().slice(0, 10);
    const daysAgo = (n) => new Date(Date.now() - n * 864e5).toISOString().slice(0, 10);
    const initials = (s) => (String(s || '?').trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join('') || '?').toUpperCase();

    // ---- inline icon set (stroke, currentColor) ----
    const ICONS = {
      clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
      check: '<path d="M20 6L9 17l-5-5"/>',
      pin: '<path d="M12 21s-6-5.7-6-10a6 6 0 0 1 12 0c0 4.3-6 10-6 10z"/><circle cx="12" cy="11" r="2"/>',
      user: '<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
      users: '<circle cx="9" cy="8" r="3.4"/><path d="M2.6 21a6.4 6.4 0 0 1 12.8 0"/><path d="M16.2 5.6a3.4 3.4 0 0 1 0 6.6"/><path d="M18.4 21a6.4 6.4 0 0 0-3-5.4"/>',
      calendar: '<rect x="3" y="4.5" width="18" height="17" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/>',
      chart: '<path d="M3 21h18"/><path d="M6.5 21v-6M12 21V6M17.5 21v-4"/>',
      sliders: '<path d="M4 6h9M17 6h3M4 12h3M11 12h9M4 18h11M19 18h1"/><circle cx="15" cy="6" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="17" cy="18" r="2"/>',
      activity: '<path d="M3 12h4l3 8 4-16 3 8h4"/>',
      checkCircle: '<circle cx="12" cy="12" r="9"/><path d="M8.4 12.4l2.6 2.6 4.6-5.2"/>',
      history: '<path d="M3.2 12a8.8 8.8 0 1 0 2.8-6.4L3 8"/><path d="M3 3.5V8h4.5"/><path d="M12 8v4.2l3 1.8"/>',
      inbox: '<path d="M4 13l2.5-8h11L20 13"/><path d="M4 13h5l1 2h4l1-2h5v6H4z"/>',
    };
    const ic = (n) => `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[n] || ICONS.clock}</svg>`;
    const empty = (icon, msg) => `<div class="empty">${ic(icon)}${esc(msg)}</div>`;

    let toastTimer;
    function toast(msg, isErr) {
      const t = $('toast'); t.textContent = msg; t.classList.toggle('err', !!isErr);
      t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    // ---- theme: honor the host's light/dark (falls back to prefers-color-scheme) ----
    function applyTheme(t) {
      if (t === 'dark' || t === 'light') {
        document.documentElement.dataset.theme = t;
        if (window.__zmap) setTimeout(() => window.__zmap.invalidateSize(), 60);
      }
    }

    async function apiFull(path, { method = 'GET', body = null } = {}) {
      const opts = { method, headers: { Authorization: 'Bearer ' + TOKEN } };
      if (body != null) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const r = await fetch(path, opts);
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error((j.error && (j.error.message || j.error)) || ('HTTP ' + r.status));
      return j; // whole envelope: { ok, data, diag? }
    }
    const api = async (path, opts) => (await apiFull(path, opts)).data;

    const TABS = {
      team: ['Team', 'users'], schedule: ['Schedule', 'calendar'], approvals: ['Approvals', 'checkCircle'],
      report: ['Report', 'chart'], zones: ['Zones', 'pin'], presence: ["Who's in", 'activity'],
      settings: ['Settings', 'sliders'], me: ['My attendance', 'user'], history: ['History', 'history'],
    };
    const MANAGER_TABS = ['team', 'schedule', 'approvals', 'report', 'zones', 'presence', 'settings'];
    const STAFF_TABS = ['me', 'history'];

    async function boot() {
      try {
        CTX = await api('/api/ui/context');
        const nm = CTX.name || 'You';
        $('who').innerHTML = `<div class="meta"><div class="nm">${esc(nm)}</div>${CTX.role ? `<div class="rl">${esc(CTX.role)}</div>` : ''}</div><div class="avatar">${esc(initials(nm))}</div>`;
        if (!CTX.role) {
          $('nav').innerHTML = '';
          $('view').innerHTML = `<div class="card">${empty('inbox', 'You’re not enrolled in attendance yet. Ask your manager to add you to the team.')}</div>`;
          return;
        }
        const tabs = CTX.role === 'manager' ? MANAGER_TABS : STAFF_TABS;
        $('nav').innerHTML = tabs.map((k) => `<button data-tab="${k}">${ic(TABS[k][1])}<span>${TABS[k][0]}</span></button>`).join('');
        $('nav').querySelectorAll('button').forEach((b) => b.onclick = () => go(b.dataset.tab));
        go(tabs[0]);
      } catch (e) {
        $('who').innerHTML = `<span class="err" style="font-size:.8rem">${esc(e.message)}</span>`;
      }
    }

    async function go(tab) {
      TAB = tab;
      $('nav').querySelectorAll('button').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
      $('view').innerHTML = '<div class="empty">Loading…</div>';
      try {
        await (VIEWS[tab] || (() => {}))();
        const v = $('view').firstElementChild; if (v) v.classList.add('fade');
      } catch (e) {
        $('view').innerHTML = `<div class="card">${empty('inbox', e.message || 'Something went wrong.')}<div style="text-align:center"><button class="btn small" id="retry">Try again</button></div></div>`;
        const rt = $('retry'); if (rt) rt.onclick = () => go(tab);
      }
    }

    const VIEWS = {};

    // ==================== STAFF ====================
    VIEWS.me = async () => {
      let st = null, zones = [];
      try { st = await api('/api/getMyStatus'); } catch (e) { throw new Error('Could not load your status: ' + e.message); }
      try { zones = await api('/api/getMyZones'); } catch (_) { zones = []; }
      const on = !!(st && st.checkedIn);
      const t = (st && st.today) || null;
      $('view').innerHTML = `
        <div class="hero ${on ? 'hero--on' : ''}">
          <div class="hero__top">
            <div class="hero__badge">${ic(on ? 'check' : 'clock')}</div>
            <div>
              <div class="hero__state">${on ? 'Checked in' : 'Not checked in'}${on ? '<span class="pulse"></span>' : ''}</div>
              <div class="hero__sub">${on && st.since ? 'On the clock since ' + timeOf(st.since) : 'You’re currently off the clock'}</div>
            </div>
          </div>
          <div class="stats">
            <div class="stat"><div class="stat__num num">${hrs(st && st.todayMinutes)}<span style="font-size:.8rem;font-weight:600"> h</span></div><div class="stat__lbl">Today</div></div>
            <div class="stat"><div class="stat__num num">${t ? timeOf(t.firstIn) : '—'}</div><div class="stat__lbl">First in</div></div>
            <div class="stat"><div class="stat__num num">${t && t.lastOut ? timeOf(t.lastOut) : '—'}</div><div class="stat__lbl">Last out</div></div>
          </div>
        </div>
        <div class="card">
          <h2>${ic('pin')} Your work zones</h2>
          ${zones.length
            ? `<div class="chips">${zones.map((z) => `<span class="chip">${ic('pin')}${esc(z.name)} <span class="muted num">· ${Math.round(z.radiusM)} m</span></span>`).join('')}</div>`
            : empty('pin', 'No work zones assigned yet.')}
          <p class="muted" style="font-size:.78rem;margin:14px 0 0">Check-in and check-out happen automatically when you arrive at and leave a zone — from the Eesa app on your phone.</p>
        </div>`;
    };

    VIEWS.history = async () => {
      const data = await api('/api/getMyHistory?days=30');
      const rows = (data && data.days) || [];             // server returns { days: [...] }
      const totalMin = rows.reduce((a, r) => a + (Number(r.totalMinutes) || 0), 0);
      const worked = rows.filter((r) => (Number(r.totalMinutes) || 0) > 0).length;
      $('view').innerHTML = `
        <div class="card">
          <div class="stats" style="margin:0">
            <div class="stat" style="background:var(--card-2)"><div class="stat__num num">${hrs(totalMin)}</div><div class="stat__lbl">Hours · 30d</div></div>
            <div class="stat" style="background:var(--card-2)"><div class="stat__num num">${worked}</div><div class="stat__lbl">Days worked</div></div>
            <div class="stat" style="background:var(--card-2)"><div class="stat__num num">${rows.length ? hrs(totalMin / Math.max(worked, 1)) : '0.0'}</div><div class="stat__lbl">Avg / day</div></div>
          </div>
        </div>
        <div class="card">
          <h2>${ic('history')} Last 30 days</h2>
          ${rows.length ? rows.map((r) => `
            <div class="rowitem">
              <div class="lead-ic">${ic('calendar')}</div>
              <div class="grow">

    VIEWS.zones = async () => {
      const zones = await api('/api/admin/zones');
      const hasMap = typeof window.L !== 'undefined';
      $('view').innerHTML = `<div class="card"><h2>${ic('pin')} Work zones</h2>
        <div id="zlist">${zones.length ? `<table><thead><tr><th>Name</th><th>Radius</th><th>Location</th><th></th></tr></thead><tbody>
          ${zones.map((z) => `<tr><td style="font-weight:600">${esc(z.name)}</td><td class="num">${Math.round(z.radiusM)} m</td><td class="muted num">${z.lat.toFixed(4)}, ${z.lng.toFixed(4)}</td>
          <td><button class="btn link" style="color:var(--danger)" data-z="${esc(z.id)}">Remove</button></td></tr>`).join('')}</tbody></table>` : empty('pin', 'No zones yet — add your first below.')}</div></div>
        <div class="card"><h2>${ic('pin')} Add zone</h2>
          <div class="row"><input id="zn" placeholder="Zone name" style="flex:1;min-width:160px">
            <button class="btn" id="zloc">Use my location</button></div>
          ${hasMap ? '<div id="zmap" style="margin-top:10px"></div><div class="map-hint">Tap the map to drop the zone, drag the dot to move it, drag the small white handle to resize.</div>' : ''}
          <div class="row" style="margin-top:6px"><input id="zlat" placeholder="lat" style="width:120px"><input id="zlng" placeholder="lng" style="width:120px">
            <input id="zr" type="number" value="100" min="10" step="10" style="width:96px"> <span class="muted">m</span>
            <button class="btn primary" id="zadd">Add</button></div>
          <div id="zloc-msg" class="muted" style="font-size:.76rem;margin-top:8px"></div></div>`;
      $('zlist').querySelectorAll('button[data-z]').forEach((b) => b.onclick = async () => {
        try { await api('/api/admin/zones/' + encodeURIComponent(b.dataset.z), { method: 'DELETE' }); toast('Removed'); go('zones'); } catch (e) { toast(e.message, true); }
      });

      let pin = null, ring = null, handle = null;
      const radiusVal = () => Math.max(10, Number($('zr').value) || 100);
      const eastEdge = (c, r) => L.latLng(c.lat, c.lng + r / ((111320 * Math.cos(c.lat * Math.PI / 180)) || 1));

      if (hasMap) {
        const map = L.map('zmap');
        window.__zmap = map;
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
        const pts = [];
        zones.forEach((z) => {
          L.circle([z.lat, z.lng], { radius: z.radiusM, color: '#8aa0a8', weight: 1, fillOpacity: .08 }).addTo(map).bindTooltip(z.name);
          pts.push([z.lat, z.lng]);
        });
        if (pts.length) map.fitBounds(pts, { padding: [40, 40], maxZoom: 16 }); else map.setView([20, 0], 2);
        setTimeout(() => map.invalidateSize(), 0);

        const pinIcon = L.divIcon({ className: '', html: '<div class="zpin"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
        const handleIcon = L.divIcon({ className: '', html: '<div class="zhandle"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
        const syncInputs = () => { const c = pin.getLatLng(); $('zlat').value = c.lat.toFixed(6); $('zlng').value = c.lng.toFixed(6); };
        const place = (latlng, fly) => {
          const r = radiusVal();
          if (!pin) {
            pin = L.marker(latlng, { draggable: true, icon: pinIcon }).addTo(map);
            ring = L.circle(latlng, { radius: r, color: '#2db4be', weight: 2, fillColor: '#2db4be', fillOpacity: .12 }).addTo(map);
            handle = L.marker(eastEdge(latlng, r), { draggable: true, icon: handleIcon }).addTo(map);
            pin.on('drag', () => { const c = pin.getLatLng(); ring.setLatLng(c); handle.setLatLng(eastEdge(c, ring.getRadius())); syncInputs(); });
            handle.on('drag', () => { const nr = Math.max(10, Math.round(pin.getLatLng().distanceTo(handle.getLatLng()))); ring.setRadius(nr); $('zr').value = nr; });
          } else { pin.setLatLng(latlng); ring.setLatLng(latlng).setRadius(r); handle.setLatLng(eastEdge(latlng, r)); }
          syncInputs();
          if (fly) map.setView(latlng, Math.max(map.getZoom(), 16));
        };
        map.on('click', (e) => place(e.latlng));
        $('zr').oninput = () => { if (ring) { ring.setRadius(radiusVal()); handle.setLatLng(eastEdge(pin.getLatLng(), radiusVal())); } };
        const fromInputs = () => { const la = Number($('zlat').value), ln = Number($('zlng').value); if ($('zlat').value && $('zlng').value && !isNaN(la) && !isNaN(ln)) place(L.latLng(la, ln), true); };
        $('zlat').onchange = fromInputs; $('zlng').onchange = fromInputs;
        window.__zplace = place;
      }

      $('zloc').onclick = () => {
        $('zloc-msg').textContent = 'Locating…';
        navigator.geolocation.getCurrentPosition(
          (p) => {
            const la = p.coords.latitude, ln = p.coords.longitude;
            $('zlat').value = la.toFixed(6); $('zlng').value = ln.toFixed(6);
            $('zloc-msg').textContent = 'Location set — adjust on the map if needed.';
            if (hasMap && window.__zplace) window.__zplace(L.latLng(la, ln), true);
          },
          (e) => { $('zloc-msg').innerHTML = '<span class="err">' + esc(e.message) + '</span>'; });
      };
      $('zadd').onclick = async () => {
        const name = $('zn').value.trim(), lat = Number($('zlat').value), lng = Number($('zlng').value), radius = radiusVal();
        if (!name || !$('zlat').value || !$('zlng').value) return toast('Name + a point on the map required', true);
        try { await api('/api/admin/zones', { method: 'POST', body: { name, lat, lng, radius } }); toast('Zone added'); go('zones'); } catch (e) { toast(e.message, true); }
      };
    };

        try { await api('/api/admin/work-types', { method: 'POST', body: { name } }); toast('Added'); go('settings'); } catch (e) { toast(e.message, true); }
      };
      $('view').querySelectorAll('button[data-w]').forEach((b) => b.onclick = async () => {
        try { await api('/api/admin/work-types/' + encodeURIComponent(b.dataset.w), { method: 'DELETE' }); toast('Removed'); go('settings'); } catch (e) { toast(e.message, true); }
      });
    };

    // ---- Host ↔ plugin session bridge ----
    window.addEventListener('message', (ev) => {
      const msg = ev.data || {};
      if (msg.type === 'eesa:session' && msg.token) {
        if (msg.theme) applyTheme(msg.theme);
        TOKEN = msg.token;
        boot();
      }
    });
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'eesa:plugin-ready', plugin: 'attendance' }, '*');
    }
  </script>
</body>
</html>
